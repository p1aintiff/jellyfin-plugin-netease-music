<!DOCTYPE html>
<html>
<head>
    <title>NetEase Music</title>
</head>
<body>
    <div id="NetEaseMusicPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="NetEaseMusicImportForm">
                    <div class="verticalSection">
                        <h2>NetEase Music</h2>
                        <p>Page version: 0.2.0</p>
                        <div class="inputContainer">
                            <input is="emby-input" id="playlistUrl" name="playlistUrl" type="url" required label="NetEase playlist URL" />
                        </div>
                        <div class="inputContainer">
                            <input is="emby-input" id="playlistName" name="playlistName" type="text" label="Jellyfin playlist name" />
                        </div>
                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" id="playlistPublic" type="checkbox" checked />
                                <span>Public playlist</span>
                            </label>
                        </div>
                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" id="saveCache" type="checkbox" checked />
                                <span>Save import history</span>
                            </label>
                        </div>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Import playlist</span>
                        </button>
                    </div>
                </form>

                <div id="NetEaseMusicProgress" class="verticalSection hide">
                    <h2>Status</h2>
                    <progress id="importProgress" max="100" value="0" style="width:100%"></progress>
                    <p id="importStatus"></p>
                </div>

                <div id="NetEaseMusicResult" class="verticalSection hide">
                    <h2>Result</h2>
                    <p id="importSummary"></p>
                    <p id="operationId"></p>
                    <div id="unmatchedSongs"></div>
                </div>

                <div id="NetEaseMusicImports" class="verticalSection">
                    <h2>Import history</h2>
                    <div id="importHistory"></div>
                </div>
            </div>
        </div>
        <script>
            (function () {
                var page = document.getElementById('NetEaseMusicPage');
                var form = page.querySelector('#NetEaseMusicImportForm');
                var progressSection = page.querySelector('#NetEaseMusicProgress');
                var progress = page.querySelector('#importProgress');
                var status = page.querySelector('#importStatus');
                var result = page.querySelector('#NetEaseMusicResult');
                var summary = page.querySelector('#importSummary');
                var operation = page.querySelector('#operationId');
                var unmatched = page.querySelector('#unmatchedSongs');
                var importHistory = page.querySelector('#importHistory');
                function asObject(response) {
                    if (response && response.responseJSON) {
                        return response.responseJSON;
                    }
                    if (response && response.responseText) {
                        return asObject(response.responseText);
                    }
                    if (response && response.Response) {
                        return asObject(response.Response);
                    }
                    if (response && response.response) {
                        return asObject(response.response);
                    }
                    if (typeof response === 'string') {
                        try {
                            return JSON.parse(response);
                        } catch (e) {
                            return {};
                        }
                    }
                    return response || {};
                }

                function pick(source, names) {
                    for (var i = 0; i < names.length; i++) {
                        if (source[names[i]] !== undefined && source[names[i]] !== null) {
                            return source[names[i]];
                        }
                    }
                    return null;
                }

                function hasImportFields(source) {
                    return source && (
                        pick(source, ['PlaylistName', 'playlistName']) !== null ||
                        pick(source, ['MatchedCount', 'matchedCount']) !== null ||
                        pick(source, ['TotalCount', 'totalCount']) !== null ||
                        pick(source, ['UnmatchedCount', 'unmatchedCount']) !== null
                    );
                }

                function importResultFrom(args) {
                    for (var i = 0; i < args.length; i++) {
                        var value = asObject(args[i]);
                        if (hasImportFields(value)) {
                            return value;
                        }
                    }
                    return asObject(args[0]);
                }

                function ajax(options) {
                    options.dataType = 'json';
                    return ApiClient.ajax(options).then(function () {
                        return importResultFrom(arguments);
                    });
                }

                function setProgress(value, text) {
                    progress.value = value;
                    status.textContent = text;
                    progressSection.classList.remove('hide');
                }

                function showResult(text, operationId, songs) {
                    summary.textContent = text;
                    operation.textContent = operationId ? 'OperationId: ' + operationId : '';
                    unmatched.innerHTML = '';

                    if (songs && songs.length) {
                        var title = document.createElement('h3');
                        title.textContent = 'Unmatched songs';
                        unmatched.appendChild(title);

                        var list = document.createElement('ul');
                        songs.slice(0, 20).forEach(function (song) {
                            var item = document.createElement('li');
                            item.textContent = (song.Name || song.name || '') + ' - ' + (song.Artist || song.artist || '');
                            list.appendChild(item);
                        });
                        unmatched.appendChild(list);
                    }

                    result.classList.remove('hide');
                }

                function renderImports(items) {
                    importHistory.innerHTML = '';
                    if (!items || !items.length) {
                        importHistory.textContent = 'No import history.';
                        return;
                    }

                    items.forEach(function (item) {
                        var row = document.createElement('div');
                        row.style.marginBottom = '1em';

                        var url = document.createElement('div');
                        url.textContent = item.NetEaseUrl || item.netEaseUrl || '';
                        row.appendChild(url);

                        var playlistId = item.JellyfinPlaylistId || item.jellyfinPlaylistId || '';
                        var id = document.createElement('div');
                        id.textContent = 'Jellyfin playlist: ' + playlistId;
                        row.appendChild(id);

                        var update = document.createElement('button');
                        update.setAttribute('is', 'emby-button');
                        update.className = 'raised';
                        update.type = 'button';
                        update.textContent = 'Update';
                        update.addEventListener('click', function () {
                            update.disabled = true;
                            setProgress(25, 'Fetching playlist');
                            ajax({
                                type: 'POST',
                                url: ApiClient.getUrl('NetEaseMusic/Imports/' + encodeURIComponent(playlistId) + '/Refresh')
                            }).then(function (importResult) {
                                setProgress(90, 'Syncing playlist');
                                showImportResult(importResult);
                                setProgress(100, 'Complete');
                            }).catch(function (error) {
                                showError(error);
                                setProgress(100, 'Failed');
                            }).finally(function () {
                                update.disabled = false;
                            });
                        });
                        row.appendChild(update);

                        var remove = document.createElement('button');
                        remove.setAttribute('is', 'emby-button');
                        remove.className = 'raised';
                        remove.type = 'button';
                        remove.textContent = 'Delete cache';
                        remove.addEventListener('click', function () {
                            remove.disabled = true;
                            ApiClient.ajax({
                                type: 'DELETE',
                                url: ApiClient.getUrl('NetEaseMusic/Imports/' + encodeURIComponent(playlistId))
                            }).then(loadImports).finally(function () {
                                remove.disabled = false;
                            });
                        });
                        row.appendChild(remove);

                        importHistory.appendChild(row);
                    });
                }

                function loadImports() {
                    ajax({
                        type: 'GET',
                        url: ApiClient.getUrl('NetEaseMusic/Imports')
                    }).then(renderImports).catch(function () {
                        importHistory.textContent = 'Failed to load import history.';
                    });
                }

                function showImportResult(importResult) {
                    var playlistName = pick(importResult, ['PlaylistName', 'playlistName']) || 'Imported playlist';
                    var matchedCount = pick(importResult, ['MatchedCount', 'matchedCount']) || 0;
                    var totalCount = pick(importResult, ['TotalCount', 'totalCount']) || 0;
                    var unmatchedCount = pick(importResult, ['UnmatchedCount', 'unmatchedCount']) || 0;
                    var operationId = pick(importResult, ['OperationId', 'operationId']);
                    var unmatchedSongs = pick(importResult, ['UnmatchedSongs', 'unmatchedSongs']) || [];
                    showResult(
                        playlistName + ': ' + matchedCount + '/' + totalCount + ' matched, ' + unmatchedCount + ' unmatched.',
                        operationId,
                        unmatchedSongs
                    );
                }

                function showError(error) {
                    var body = asObject(error && (error.responseJSON || error.responseText)) || {};
                    showResult(body.error || 'Import failed.', body.operationId, null);
                }

                form.addEventListener('submit', function (event) {
                    event.preventDefault();

                    var button = form.querySelector('button[type="submit"]');
                    var body = {
                        Url: page.querySelector('#playlistUrl').value,
                        PlaylistName: page.querySelector('#playlistName').value || null,
                        Public: page.querySelector('#playlistPublic').checked,
                        SaveCache: page.querySelector('#saveCache').checked
                    };

                    button.disabled = true;
                    result.classList.add('hide');
                    setProgress(25, 'Fetching playlist');
                    Dashboard.showLoadingMsg();

                    window.setTimeout(function () {
                        if (button.disabled) setProgress(65, 'Matching songs');
                    }, 800);

                    ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('NetEaseMusic/Import'),
                        data: JSON.stringify(body),
                        contentType: 'application/json'
                    }).then(function (importResult) {
                        setProgress(90, 'Creating playlist');
                        showImportResult(importResult);
                        setProgress(100, 'Complete');
                        loadImports();
                    }).catch(function (error) {
                        showError(error);
                        setProgress(100, 'Failed');
                    }).finally(function () {
                        button.disabled = false;
                        Dashboard.hideLoadingMsg();
                    });
                });
                loadImports();
            })();
        </script>
    </div>
</body>
</html>
