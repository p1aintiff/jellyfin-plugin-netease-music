name: Build plugin repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: Build
        run: dotnet build Jellyfin.Plugin.NetEaseMusic/Jellyfin.Plugin.NetEaseMusic.csproj -c Release

      - name: Publish plugin repository
        shell: pwsh
        run: |
          $project = "Jellyfin.Plugin.NetEaseMusic/Jellyfin.Plugin.NetEaseMusic.csproj"
          $projectXml = [xml](Get-Content $project)
          $info = Get-Content "manifest-info.json" | ConvertFrom-Json
          $version = $projectXml.Project.PropertyGroup.Version
          $assemblyVersion = $projectXml.Project.PropertyGroup.AssemblyVersion
          $targetAbi = "10.10.7.0"
          $repoName = "${{ github.event.repository.name }}"
          $owner = "${{ github.repository_owner }}"
          $baseUrl = "https://$owner.github.io/$repoName"
          $versions = @()

          function Get-Changelog($version, $fallback) {
            $entry = $info.changelog.PSObject.Properties[$version]
            if ($entry) {
              return $entry.Value
            }

            return $fallback
          }

          function Get-PackageVersion($assemblyVersion) {
            if ($assemblyVersion -match '^(\d+\.\d+\.\d+)\.0$') {
              return $Matches[1]
            }

            return $assemblyVersion
          }

          function New-PackageVersion($sourceDir, $version, $assemblyVersion) {
            $projectPath = Join-Path $sourceDir "Jellyfin.Plugin.NetEaseMusic/Jellyfin.Plugin.NetEaseMusic.csproj"
            $publishOutput = dotnet publish $projectPath -c Release 2>&1
            $publishOutput | ForEach-Object { Write-Host $_ }
            if ($LASTEXITCODE -ne 0) {
              throw "dotnet publish failed for $assemblyVersion"
            }

            $publish = Join-Path $sourceDir "Jellyfin.Plugin.NetEaseMusic/bin/Release/net8.0/publish"
            $safeVersion = $version
            $packageDir = "site/NetEaseMusicImporter-$safeVersion"
            New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
            Copy-Item "$publish/Jellyfin.Plugin.NetEaseMusic.dll" $packageDir
            Copy-Item "$publish/Jellyfin.Plugin.NetEaseMusic.pdb" $packageDir
            Copy-Item (Join-Path $sourceDir "build.yaml") $packageDir

            $zipName = "NetEaseMusicImporter-$safeVersion.zip"
            $zipPath = "site/$zipName"
            Compress-Archive -Path "$packageDir/*" -DestinationPath $zipPath -Force
            $checksum = (Get-FileHash $zipPath -Algorithm MD5).Hash.ToLowerInvariant()
            $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

            return [ordered]@{
              version = $assemblyVersion
              changelog = Get-Changelog $assemblyVersion "Build $assemblyVersion."
              targetAbi = $targetAbi
              sourceUrl = "$baseUrl/$zipName"
              checksum = $checksum
              timestamp = $timestamp
            }
          }

          New-Item -ItemType Directory -Force -Path "site" | Out-Null
          $versions += New-PackageVersion "." $version $assemblyVersion

          foreach ($entry in ($info.changelog.PSObject.Properties | Sort-Object { [version]$_.Name } -Descending)) {
            if ($entry.Name -eq $assemblyVersion) {
              continue
            }

            $tagVersion = Get-PackageVersion $entry.Name
            $tag = "v$tagVersion"
            $tagExists = git tag --list $tag
            if (-not $tagExists) {
              Write-Host "Skip $($entry.Name): tag $tag not found."
              continue
            }

            $workDir = "history/$tagVersion"
            New-Item -ItemType Directory -Force -Path $workDir | Out-Null
            git archive $tag --format=tar | tar -x -C $workDir
            $versions += New-PackageVersion $workDir $tagVersion $entry.Name
          }

          $manifest = @(
            [ordered]@{
              guid = $info.guid
              name = $info.name
              description = $info.description
              overview = $info.overview
              owner = $owner
              category = $info.category
              versions = $versions
            }
          )

          ConvertTo-Json -InputObject $manifest -Depth 8 | Set-Content "site/manifest.json"

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
