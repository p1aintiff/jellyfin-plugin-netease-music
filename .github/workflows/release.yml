name: Build plugin repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x

      - name: Build
        run: dotnet build Jellyfin.Plugin.NetEaseMusic/Jellyfin.Plugin.NetEaseMusic.csproj -c Release

      - name: Publish plugin repository
        shell: pwsh
        run: |
          $project = "Jellyfin.Plugin.NetEaseMusic/Jellyfin.Plugin.NetEaseMusic.csproj"
          $projectXml = [xml](Get-Content $project)
          $info = Get-Content "manifest-info.json" | ConvertFrom-Json
          $version = $projectXml.Project.PropertyGroup.Version
          $assemblyVersion = $projectXml.Project.PropertyGroup.AssemblyVersion
          $targetAbi = "10.10.7.0"
          $repoName = "${{ github.event.repository.name }}"
          $owner = "${{ github.repository_owner }}"
          $baseUrl = "https://$owner.github.io/$repoName"

          dotnet publish $project -c Release

          $publish = "Jellyfin.Plugin.NetEaseMusic/bin/Release/net8.0/publish"
          $packageDir = "site/NetEaseMusicImporter"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "$publish/Jellyfin.Plugin.NetEaseMusic.dll" $packageDir
          Copy-Item "$publish/Jellyfin.Plugin.NetEaseMusic.pdb" $packageDir
          Copy-Item "build.yaml" $packageDir

          $zipName = "NetEaseMusicImporter-$version.zip"
          $zipPath = "site/$zipName"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $zipPath -Force
          $checksum = (Get-FileHash $zipPath -Algorithm MD5).Hash.ToLowerInvariant()
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $versions = @()
          function Get-Changelog($version, $fallback) {
            $entry = $info.changelog.PSObject.Properties[$version]
            if ($entry) {
              return $entry.Value
            }

            return $fallback
          }

          try {
            $published = Invoke-RestMethod "$baseUrl/manifest.json"
            foreach ($oldVersion in @($published[0].versions)) {
              if ($oldVersion.version -eq $assemblyVersion) {
                continue
              }

              $versions += [ordered]@{
                version = $oldVersion.version
                changelog = Get-Changelog $oldVersion.version $oldVersion.changelog
                targetAbi = $oldVersion.targetAbi
                sourceUrl = $oldVersion.sourceUrl
                checksum = $oldVersion.checksum
                timestamp = $oldVersion.timestamp
              }

              $oldZipName = Split-Path ([uri]$oldVersion.sourceUrl).AbsolutePath -Leaf
              if ($oldZipName) {
                Invoke-WebRequest $oldVersion.sourceUrl -OutFile "site/$oldZipName" -ErrorAction SilentlyContinue
              }
            }
          } catch {
            Write-Host "No existing manifest found. Publishing current version only."
          }

          $versions = @(
            [ordered]@{
              version = $assemblyVersion
              changelog = Get-Changelog $assemblyVersion "Build $assemblyVersion."
              targetAbi = $targetAbi
              sourceUrl = "$baseUrl/$zipName"
              checksum = $checksum
              timestamp = $timestamp
            }
          ) + $versions

          $manifest = @(
            [ordered]@{
              guid = $info.guid
              name = $info.name
              description = $info.description
              overview = $info.overview
              owner = $owner
              category = $info.category
              versions = $versions
            }
          )

          ConvertTo-Json -InputObject $manifest -Depth 8 | Set-Content "site/manifest.json"

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
