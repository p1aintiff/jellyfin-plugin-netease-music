<!DOCTYPE html>
<html>
<head>
    <title>NetEase Music</title>
</head>
<body>
    <div id="NetEaseMusicPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="NetEaseMusicImportForm">
                    <div class="verticalSection">
                        <h2>NetEase Music</h2>
                        <p>Page version: 0.1.5</p>
                        <p id="currentUser">Current user: loading</p>
                        <div class="inputContainer">
                            <input is="emby-input" id="playlistUrl" name="playlistUrl" type="url" required label="NetEase playlist URL" />
                        </div>
                        <div class="inputContainer">
                            <input is="emby-input" id="playlistName" name="playlistName" type="text" label="Jellyfin playlist name" />
                        </div>
                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" id="playlistPublic" type="checkbox" checked />
                                <span>Public playlist</span>
                            </label>
                        </div>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Import playlist</span>
                        </button>
                    </div>
                </form>

                <div id="NetEaseMusicProgress" class="verticalSection hide">
                    <h2>Status</h2>
                    <progress id="importProgress" max="100" value="0" style="width:100%"></progress>
                    <p id="importStatus"></p>
                </div>

                <div id="NetEaseMusicResult" class="verticalSection hide">
                    <h2>Result</h2>
                    <p id="importSummary"></p>
                    <p id="operationId"></p>
                    <div id="unmatchedSongs"></div>
                </div>
            </div>
        </div>
        <script>
            (function () {
                var page = document.getElementById('NetEaseMusicPage');
                var form = page.querySelector('#NetEaseMusicImportForm');
                var progressSection = page.querySelector('#NetEaseMusicProgress');
                var progress = page.querySelector('#importProgress');
                var status = page.querySelector('#importStatus');
                var result = page.querySelector('#NetEaseMusicResult');
                var summary = page.querySelector('#importSummary');
                var operation = page.querySelector('#operationId');
                var unmatched = page.querySelector('#unmatchedSongs');
                var currentUser = page.querySelector('#currentUser');
                var submitButton = form.querySelector('button[type="submit"]');

                submitButton.disabled = true;

                ApiClient.ajax({
                    type: 'GET',
                    url: ApiClient.getUrl('NetEaseMusic/CurrentUser')
                }).then(function (response) {
                    var user = asObject(response);
                    var name = pick(user, ['Name', 'name', 'Username', 'username', 'UserName', 'userName']);
                    var userId = pick(user, ['UserId', 'userId', 'Id', 'id']);
                    if (name || userId) {
                        currentUser.textContent = 'Current user: ' + (name || 'unknown') + (userId ? ' (' + userId + ')' : '');
                        submitButton.disabled = false;
                    } else {
                        currentUser.textContent = 'Current user: unavailable';
                    }
                }).catch(function () {
                    currentUser.textContent = 'Current user: unavailable';
                });

                function asObject(response) {
                    if (typeof response === 'string') {
                        try {
                            return JSON.parse(response);
                        } catch (e) {
                            return {};
                        }
                    }
                    return response || {};
                }

                function pick(source, names) {
                    for (var i = 0; i < names.length; i++) {
                        if (source[names[i]] !== undefined && source[names[i]] !== null) {
                            return source[names[i]];
                        }
                    }
                    return null;
                }

                function setProgress(value, text) {
                    progress.value = value;
                    status.textContent = text;
                    progressSection.classList.remove('hide');
                }

                function showResult(text, operationId, songs) {
                    summary.textContent = text;
                    operation.textContent = operationId ? 'OperationId: ' + operationId : '';
                    unmatched.innerHTML = '';

                    if (songs && songs.length) {
                        var title = document.createElement('h3');
                        title.textContent = 'Unmatched songs';
                        unmatched.appendChild(title);

                        var list = document.createElement('ul');
                        songs.slice(0, 20).forEach(function (song) {
                            var item = document.createElement('li');
                            item.textContent = (song.Name || song.name || '') + ' - ' + (song.Artist || song.artist || '');
                            list.appendChild(item);
                        });
                        unmatched.appendChild(list);
                    }

                    result.classList.remove('hide');
                }

                form.addEventListener('submit', function (event) {
                    event.preventDefault();

                    var button = form.querySelector('button[type="submit"]');
                    var body = {
                        Url: page.querySelector('#playlistUrl').value,
                        PlaylistName: page.querySelector('#playlistName').value || null,
                        Public: page.querySelector('#playlistPublic').checked
                    };

                    button.disabled = true;
                    result.classList.add('hide');
                    setProgress(25, 'Fetching playlist');
                    Dashboard.showLoadingMsg();

                    window.setTimeout(function () {
                        if (button.disabled) setProgress(65, 'Matching songs');
                    }, 800);

                    ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl('NetEaseMusic/Import'),
                        data: JSON.stringify(body),
                        contentType: 'application/json'
                    }).then(function (response) {
                        var importResult = asObject(response);
                        var playlistName = pick(importResult, ['PlaylistName', 'playlistName']) || 'Imported playlist';
                        var matchedCount = pick(importResult, ['MatchedCount', 'matchedCount']) || 0;
                        var totalCount = pick(importResult, ['TotalCount', 'totalCount']) || 0;
                        var unmatchedCount = pick(importResult, ['UnmatchedCount', 'unmatchedCount']) || 0;
                        var operationId = pick(importResult, ['OperationId', 'operationId']);
                        var unmatchedSongs = pick(importResult, ['UnmatchedSongs', 'unmatchedSongs']) || [];
                        setProgress(90, 'Creating playlist');
                        showResult(
                            playlistName + ': ' + matchedCount + '/' + totalCount + ' matched, ' + unmatchedCount + ' unmatched.',
                            operationId,
                            unmatchedSongs
                        );
                        setProgress(100, 'Complete');
                    }).catch(function (error) {
                        var message = 'Import failed.';
                        if (error && error.responseJSON) {
                            message = error.responseJSON.error || message;
                            showResult(message, error.responseJSON.operationId, null);
                        } else {
                            showResult(message, '', null);
                        }
                        setProgress(100, 'Failed');
                    }).finally(function () {
                        button.disabled = false;
                        Dashboard.hideLoadingMsg();
                    });
                });
            })();
        </script>
    </div>
</body>
</html>
